name: pages

on:
  push:
    branches: [main]
    paths:
      - "apps/web/public/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# §S49 — host day.scaffold.at via GitHub Pages.
#
# Source = apps/web/public/. v0.1 ships a static placeholder
# index.html, install.sh, and CNAME. The full landing (S52) and the
# docs site MVP (S53) reuse this same publishing pipeline.

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/public

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
